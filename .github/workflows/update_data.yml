name: Automated Data Fetcher

on:
  schedule:
    # Run every day at 03:00 JST (18:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run YouTube Fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/youtube_fetcher.js

      # NOTE: gadget_fetcher.js is disabled (mock implementation - would randomize prices)
      # - name: Run Gadget Price Fetcher
      #   env:
      #     RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
      #   run: node scripts/gadget_fetcher.js

      - name: Check for Changes and Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if data files have been modified
          if [[ -n "$(git status --porcelain public/data/)" ]]; then
            git add public/data/
            git commit -m "chore(data): auto-update youtube and gadget data"
            git push
            echo "Data updated and pushed successfully."
          else
            echo "No changes in data. Skipping commit."
          fi
